<!--
  email_template.html
  ===========================================================================
  [용도] Outlook 발송용 HTML 템플릿 - 참고/문서화 목적 파일.
  실제 발송 본문은 email_sender.py의 build_email_html() 함수가 Python 코드로
  동적 생성한다 (Flask Jinja2 템플릿 엔진이 아니라, Outlook 렌더링 엔진 호환을
  위해 순수 문자열 조합 방식을 사용함 - render_template()으로 렌더링하지 않음).

  이 파일은 build_email_html()이 생성하는 HTML 구조를 사람이 읽을 수 있는
  정적 예시로 보여주기 위한 참고용 스냅샷이다. 실제 값(기사 목록 등)은
  Python에서 채워지므로, 이 파일을 직접 웹서버가 서빙하지는 않는다.

  [Outlook 호환 원칙]
  - Outlook 데스크톱 앱은 Word 렌더링 엔진을 사용하므로 float/flexbox 미지원
  - 반드시 <table> 레이아웃 + 인라인 style만 사용
  - 구조: 상단 요약 → 경고 → 배포자료 → 자사 → 경쟁사 → 업계 → 하단 안내문구
  ===========================================================================
-->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0; padding:0; background-color:#ffffff; font-family:'Malgun Gothic', Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center">
        <table role="presentation" width="680" cellpadding="0" cellspacing="0" border="0">
          <tr><td>

            <!-- 상단 요약 -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:20px;">
              <tr>
                <td style="background-color:#1a56db; padding:16px; color:#ffffff; font-size:18px; font-weight:bold;">
                  오토플러스 뉴스 모니터링 - {{발행일}}
                </td>
              </tr>
              <tr>
                <td style="padding:12px; font-size:13px; color:#333333; background-color:#f8f9fa;">
                  총 {{총건수}}건 (자사 {{자사건수}} / 경쟁사 {{경쟁사건수}} / 업계 {{업계건수}}) | 경고 {{경고건수}}건
                </td>
              </tr>
            </table>

            <!-- 경고 섹션 -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;">
              <tr>
                <td style="background-color:#fde8e8; padding:10px 12px; font-size:16px; font-weight:bold; color:#111111;">
                  [경고] 부정 이슈 후보 / 민감 이슈
                </td>
              </tr>
              <tr>
                <td style="padding:8px; font-size:14px; color:#222222; border-bottom:1px solid #eeeeee;">
                  ▷ [매체명] 기자명 | <a href="#" style="color:#1a56db; text-decoration:none;">기사 제목</a>
                </td>
              </tr>
              <tr>
                <td style="padding:2px 8px 10px 20px; font-size:12px; color:#888888; font-style:italic; border-bottom:1px solid #eeeeee;">
                  - AI 판단 근거: 예시 텍스트
                </td>
              </tr>
            </table>

            <!-- 자사/경쟁사/업계 섹션도 동일한 table 구조 반복 (배경색만 상이) -->
            <!-- 자사: #e6f4ea / 경쟁사: #fff4e5 / 업계: #eef2ff -->

            <!-- 하단 안내문구 -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:20px;">
              <tr>
                <td style="padding:12px; font-size:11px; color:#999999; border-top:1px solid #eeeeee;">
                  본 메일은 오토플러스 PR팀 언론 모니터링 자동화 시스템에서 발송되었습니다.
                </td>
              </tr>
            </table>

          </td></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
